apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: {{ .Values.gateway.namespace }}
  {{- if .Values.gateway.externalTarget }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ .Values.gateway.externalTarget }}
  {{- end }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http
  hostnames:
    - "*.{{ .Values.global.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
