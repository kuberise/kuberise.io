apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: {{ .Values.gateway.namespace }}
spec:
  parentRefs:
    - name: platform-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http
  hostnames:
    - "*.{{ .Values.global.domain }}"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
