{{- if .Values.gateway.nodePort.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gateway-nodeport
  namespace: {{ .Values.gateway.namespace }}
  {{- if .Values.gateway.externalTarget }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "*.{{ .Values.global.domain }}"
    external-dns.alpha.kubernetes.io/target: {{ .Values.gateway.externalTarget }}
  {{- end }}
spec:
  type: NodePort
  selector:
    k8s-app: cilium-envoy
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
      nodePort: {{ .Values.gateway.nodePort.https }}
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: {{ .Values.gateway.nodePort.http }}
{{- end }}
