apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.global.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ .Values.gateway.tlsSecretName }}
            namespace: {{ .Values.gateway.tlsSecretNamespace }}
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.{{ .Values.global.domain }}"
      allowedRoutes:
        namespaces:
          from: All
