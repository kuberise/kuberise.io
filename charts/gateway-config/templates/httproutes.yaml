{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  {{- if $.Values.gateway.externalTarget }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ $.Values.gateway.externalTarget }}
  {{- end }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gateway
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: https
  hostnames:
    - "{{ .subdomain }}.{{ $.Values.global.domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .serviceName }}
          port: {{ .port }}
          weight: 1
{{- end }}
